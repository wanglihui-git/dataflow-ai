<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>快照 02 - Dashboard</title>
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <div class="sidebar">
    <div style="color:#f8fafc;font-weight:600;margin-bottom:24px">数据流转换平台</div>

    <div class="card"><table><tr><th>运行 ID</th><th>管道</th><th>状态</th><th>触发者</th></tr>
