<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>快照 01 - 登录</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    .login-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(160deg,#f1f5f9,#e2e8f0); }
    .brand { display: flex; gap: 12px; align-items: center; font-size: 20px; font-weight: 600; margin-bottom: 24px; }
    .logo { width: 40px; height: 40px; background: #2563eb; color: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .login-card { width: 400px; }
    .field { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 6px; }
    .btn { width: 100%; padding: 12px; background: #2563eb; color: #fff; border: none; border-radius: 6px; margin-top: 12px; }
    footer { margin-top: 40px; font-size: 12px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="brand"><div class="logo">DF</div>数据流转换平台</div>
    <div class="card login-card">
      <h2 style="margin-bottom:4px">欢迎登录</h2>
      <p style="color:#64748b;font-size:14px;margin-bottom:20px">请使用您的账号登录系统</p>
      <input class="field" placeholder="用户名" />
      <input class="field" type="password" placeholder="密码" />
      <label style="font-size:13px"><input type="checkbox" /> 记住我</label>
      <button class="btn">登录</button>
      <p style="margin-top:16px;font-size:13px;color:#94a3b8">忘记密码？请联系管理员 · 没有账号？请联系管理员开通</p>
    </div>
    <footer>DataFlow AI v1.0.0 · © 2026</footer>
  </div>
</body>
</html>
